name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check (astro + tsc)
        run: npm run typecheck

      - name: Build
        env:
          SITE_URL: ${{ secrets.SITE_URL || 'https://example.com' }}
        run: npm run build
